<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#007AFF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="מרכז פיקוד">
  <title>מרכז פיקוד</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="stylesheet" href="css/style.css">
  <!-- GunDB — real-time sync, zero setup -->
  <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
</head>
<body>
  <div id="app">
    <header id="app-header">
      <div class="header-inner">
        <div id="header-title">דף הבית</div>
        <div style="display:flex;align-items:center;gap:12px">
          <span id="sync-status" title="סנכרון ענן" style="font-size:20px;cursor:pointer"
                onclick="showWorkspaceInfo()">☁️</span>
          <span id="notif-btn" title="התראות" style="font-size:20px;cursor:pointer"
                onclick="openNotificationSettings()">🔔</span>
          <span title="הגדרות" style="font-size:20px;cursor:pointer"
                onclick="openSettings()">⚙️</span>
          <div id="header-date"></div>
        </div>
      </div>
    </header>

    <main id="app-main">
      <div id="page-home"     class="page"></div>
      <div id="page-brain"    class="page hidden"></div>
      <div id="page-finance"  class="page hidden"></div>
      <div id="page-crossfit" class="page hidden"></div>
      <div id="page-family"   class="page hidden"></div>
    </main>

    <button id="fab" aria-label="הוסף">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </button>

    <nav id="bottom-nav">
      <button class="nav-item active" data-page="home">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
          <polyline points="9,22 9,12 15,12 15,22"/>
        </svg>
        <span>בית</span>
      </button>
      <button class="nav-item" data-page="brain">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2C8.5 2 6 4.5 6 7c0 1.5.5 2.8 1.4 3.8C6.5 11.5 6 12.7 6 14c0 2.2 1.3 4 3 4.8V20a1 1 0 001 1h4a1 1 0 001-1v-1.2c1.7-.8 3-2.6 3-4.8 0-1.3-.5-2.5-1.4-3.2C17.5 9.8 18 8.5 18 7c0-2.5-2.5-5-6-5z"/>
        </svg>
        <span>מוח</span>
      </button>
      <button class="nav-item" data-page="finance">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="5" width="20" height="14" rx="2"/>
          <line x1="2" y1="10" x2="22" y2="10"/>
        </svg>
        <span>כספים</span>
      </button>
<button class="nav-item" data-page="family">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
        </svg>
        <span>משפחה</span>
      </button>
    </nav>

    <!-- Bottom Sheet Modal -->
    <div id="modal-overlay" class="hidden">
      <div id="modal-backdrop"></div>
      <div id="modal-sheet">
        <div class="modal-handle"></div>
        <div id="modal-content"></div>
      </div>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/firebase-sync.js"></script>
  <script src="js/push-notifications.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
